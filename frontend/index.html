<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo — CineRenta</title>
<link rel="stylesheet" href="custom.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">CineRenta</a>
  <div class="nav-links">
    <a href="index.html" class="active">Catálogo</a>
    <a href="historial.html">Mis Pedidos</a>
    <a href="chat.html">Chat</a>
  </div>
  <div class="nav-user">
    Hola, <span id="nav-email">...</span>
    <button class="btn-logout" id="btn-logout">Salir</button>
  </div>
</nav>

<div class="hero">
  <h1>Renta tu película favorita</h1>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-genre="todos">Todos</button>
</div>

<div class="catalog" id="catalog">
  <div class="loading">Cargando catálogo...</div>
</div>

<!-- Botón flotante para ver carrito -->
<button class="cart-fab" onclick="window.location.href='checkout.html'" title="Ver carrito">
  🎬 <span class="cart-count" id="cart-count">0</span>
</button>

<!-- Botón flotante para ir al chat -->
<button class="chat-fab" onclick="window.location.href='chat.html'" title="Chat">💬</button>

<script type="module">
import { authAdapter, productAdapter, requireAuth } from './infraestructure/app.js';

const token = requireAuth();
if (!token) throw new Error('no auth');

authAdapter.getMe(token).then(u => {
  document.getElementById('nav-email').textContent = u.email.split('@')[0];
}).catch(() => {});

document.getElementById('btn-logout').addEventListener('click', () => authAdapter.logout(token));

function getCarrito() { return JSON.parse(localStorage.getItem('carrito') || '[]'); }
function updateCartCount() { document.getElementById('cart-count').textContent = getCarrito().length; }
updateCartCount();

let allProducts = [];
productAdapter.listarTodos().then(products => {
  allProducts = products;
  renderGenres(products);
  renderProducts(products);
}).catch(e => {
  document.getElementById('catalog').innerHTML = `<div class="empty">Error al cargar catálogo</div>`;
});

function renderGenres(products) {
  const genres = ['todos', ...new Set(products.map(p => p.genero).filter(Boolean))];
  const filters = document.getElementById('filters');
  filters.innerHTML = genres.map(g =>
    `<button class="filter-btn ${g==='todos'?'active':''}" data-genre="${g}">${g}</button>`
  ).join('');
  filters.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filters.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const genre = btn.dataset.genre;
      renderProducts(genre === 'todos' ? allProducts : allProducts.filter(p => p.genero === genre));
    });
  });
}

function renderProducts(products) {
  const catalog = document.getElementById('catalog');
  if (!products.length) {
    catalog.innerHTML = '<div class="empty">Sin películas en esta categoría</div>';
    return;
  }
  catalog.innerHTML = products.map(p => `
    <div class="card">
      <div class="card-img">
        ${p.imgurl ? `<img src="${p.imgurl}" alt="${p.titulo}" onerror="this.parentElement.textContent='🎬'">` : '🎬'}
      </div>
      <span class="card-badge">${p.disponible ? 'Disponible' : 'No disponible'}</span>
      <div class="card-body">
        <div class="card-genre">${p.genero || 'General'}</div>
        <h3 class="card-title">${p.titulo}</h3>
        <div class="card-duration">${p.duracion ? p.duracion + ' min' : ''}</div>
        <div class="card-footer">
          <span class="card-price">$${Number(p.precio).toFixed(2)}</span>
          <button class="btn-renta" data-id="${p.id}" data-titulo="${p.titulo}" data-precio="${p.precio}" ${!p.disponible ? 'disabled' : ''}>
            Rentar
          </button>
        </div>
      </div>
    </div>
  `).join('');

  catalog.querySelectorAll('.btn-renta').forEach(btn => {
    btn.addEventListener('click', () => {
      const carrito = getCarrito();
      if (carrito.find(i => i.id === btn.dataset.id)) {
        alert('Ya está en tu carrito');
        return;
      }
      carrito.push({ id: btn.dataset.id, titulo: btn.dataset.titulo, precio: Number(btn.dataset.precio) });
      localStorage.setItem('carrito', JSON.stringify(carrito));
      updateCartCount();
      btn.textContent = '✓ Agregado';
      btn.disabled = true;
    });
  });
}
</script>
</body>
</html>
