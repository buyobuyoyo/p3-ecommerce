<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buyos Movie Lair</title>
<link rel="stylesheet" href="custom.css">
<link rel="icon" href="./assets/favicon/favicon.ico" type="image/x-icon">
<style>
  body { background-image: none; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Buyos Movie Lair</a>
  <div class="nav-links">
    <a href="index.html">Catálogo</a>
    <a href="historial.html" class="active">Mis Pedidos</a>
    <a href="chat.html">Chat</a>
  </div>
</nav>

<div class="page">
  <h1>Mis Pedidos</h1>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Película</th>
          <th>Fecha Renta</th>
          <th>Devolución</th>
          <th>Total</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="loading">Cargando pedidos...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script type="module">
import { pedidoAdapter, productAdapter, requireAuth } from './infraestructure/app.js';
const token = requireAuth();
if (!token) throw new Error('no auth');

async function load() {
  const tbody = document.getElementById('tbody');
  try {
    const pedidos = await pedidoAdapter.misPedidos(token);
    if (!pedidos.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">No tienes pedidos aún. <a href="index.html">Ver catálogo</a></td></tr>';
      return;
    }

    const productMap = {};
    await Promise.all(pedidos.map(async p => {
      if (!productMap[p.id_product]) {
        try {
          const prod = await productAdapter.obtener(p.id_product);
          productMap[p.id_product] = prod.titulo;
        } catch { productMap[p.id_product] = p.id_product; }
      }
    }));

    tbody.innerHTML = pedidos.map(p => {
      const badgeClass = p.estado === 'activo' ? 'badge-activo' : p.estado === 'vencido' ? 'badge-vencido' : 'badge-devuelto';
      return `<tr>
        <td>${productMap[p.id_product] || '—'}</td>
        <td>${p.fecha_renta || '—'}</td>
        <td>${p.fecha_devolucion || '—'}</td>
        <td class="price">$${Number(p.total).toFixed(2)}</td>
        <td><span class="badge ${badgeClass}">${p.estado}</span></td>
      </tr>`;
    }).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">Error al cargar pedidos</td></tr>';
  }
}
load();
</script>
</body>
</html>
