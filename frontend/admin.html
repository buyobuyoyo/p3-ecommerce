<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buyos Movie Lair</title>
<link rel="stylesheet" href="custom.css">
<link rel="icon" href="./assets/favicon/favicon.ico" type="image/x-icon">

</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Buyos Movie Lair</a>
  <span class="admin-badge">Admin</span>
  <div class="nav-right">
    <button class="btn-logout" id="btn-logout">Salir</button>
  </div>
</nav>

<div class="page">
  <div class="tabs">
    <button class="tab active" data-tab="products">Películas</button>
    <button class="tab" data-tab="orders">Pedidos</button>
  </div>

  <!-- TAB PELÍCULAS -->
  <div class="tab-content active" id="tab-products">
    <div class="products-header">
      <h2>Catálogo</h2>
      <button class="btn-primary" id="btn-new">+ Nueva Película</button>
    </div>
    <div class="products-grid" id="products-grid">
      <div class="loading">Cargando...</div>
    </div>
  </div>

  <!-- TAB PEDIDOS -->
  <div class="tab-content" id="tab-orders">
    <h2>Pedidos</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>Producto</th><th>Fecha Renta</th><th>Total</th><th>Estado</th></tr>
        </thead>
        <tbody id="orders-tbody"><tr><td colspan="5" class="loading">Cargando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL PARA NUEVO/EDITAR -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Nueva Película</h3>
    <div class="form-group"><label>Título *</label><input id="f-titulo" placeholder="Nombre de la película"></div>
    <div class="form-group"><label>Descripción *</label><input id="f-descripcion" placeholder="Sinopsis breve"></div>
    <div class="form-group"><label>Género *</label><input id="f-genero" placeholder="Acción, Drama, Comedia..."></div>
    <div class="form-group"><label>Precio *</label><input id="f-precio" type="number" step="0.01" placeholder="0.00"></div>
    <div class="form-group">
  <label>Imagen</label>
  <input type="file" id="f-imgfile" accept="image/*">
</div>
    <img id="vistaPrevia" src="" alt="Vista previa de la imagen" style="display: none; max-width: 300px;">
    <div class="form-group"><label>Duración (min)</label><input id="f-duracion" type="number" placeholder="120"></div>
    <div class="form-group"><label>Año de lanzamiento</label><input id="f-lanzamiento" placeholder="2024-01-01"></div>
    <div id="modal-msg"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">Cancelar</button>
      <button class="btn-primary" id="btn-save">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
import { authAdapter, productAdapter, pedidoAdapter, requireAuth, getToken, BACKEND } from './infraestructure/app.js';
const token = requireAuth();
if (!token) throw new Error('no auth');

document.getElementById('btn-logout').addEventListener('click', () => authAdapter.logout(token));

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'orders') loadOrders();
  });
});

let editingId = null;

async function loadProducts() {
  const grid = document.getElementById('products-grid');
  try {
    const products = await productAdapter.listarTodos();
    if (!products.length) { grid.innerHTML = '<div class="loading">Sin películas</div>'; return; }
    grid.innerHTML = products.map(p => `
      <div class="admin-card">
        <div class="admin-card-img">
          ${p.imgurl ? `<img src="${p.imgurl}" alt="${p.titulo}" onerror="this.parentElement.textContent='🎬'">` : '🎬'}
        </div>
        <div class="admin-card-body">
          <h3 class="admin-card-title">${p.titulo}</h3>
          <div class="admin-card-meta">${p.genero || ''} · $${Number(p.precio).toFixed(2)} · ${p.disponible ? 'Disponible' : 'No disponible'}</div>
          <div class="admin-card-actions">
            <button class="btn-edit" data-id="${p.id}" data-titulo="${p.titulo}" data-desc="${p.descripcion || ''}"
              data-genero="${p.genero || ''}" data-precio="${p.precio}" data-img="${p.imgurl || ''}"
              data-dur="${p.duracion || ''}" data-lanz="${p.lanzamiento || ''}">Editar</button>
            <button class="btn-delete" data-id="${p.id}">Eliminar</button>
          </div>
        </div>
      </div>
    `).join('');

    grid.querySelectorAll('.btn-edit').forEach(btn => {
      btn.addEventListener('click', () => {
        editingId = btn.dataset.id;
        document.getElementById('modal-title').textContent = 'Editar Película';
        document.getElementById('f-titulo').value = btn.dataset.titulo;
        document.getElementById('f-descripcion').value = btn.dataset.desc;
        document.getElementById('f-genero').value = btn.dataset.genero;
        document.getElementById('f-precio').value = btn.dataset.precio;
        document.getElementById('f-duracion').value = btn.dataset.dur;
        document.getElementById('f-lanzamiento').value = btn.dataset.lanz;
        document.getElementById('modal-msg').textContent = '';
        document.getElementById('modal').classList.add('open');
      });
    });

    grid.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('¿Eliminar esta película?')) return;
        try {
          await productAdapter.eliminar(btn.dataset.id, token);
          loadProducts();
        } catch { alert('Error al eliminar'); }
      });
    });
  } catch (e) {
    grid.innerHTML = '<div class="loading">Error al cargar. ¿Eres admin?</div>';
  }
}

document.getElementById('btn-new').addEventListener('click', () => {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Nueva Película';
  
  // Quitamos 'imgurl' del array de campos de texto
  ['titulo','descripcion','genero','precio','duracion','lanzamiento'].forEach(f => {
    document.getElementById('f-'+f).value = '';
  });
  
  // Limpiamos el input de archivo y su vista previa
  document.getElementById('f-imgfile').value = '';
  document.getElementById('modal-msg').textContent = '';
  document.getElementById('modal').classList.add('open');
});

document.getElementById('btn-cancel').addEventListener('click', () => document.getElementById('modal').classList.remove('open'));

document.getElementById('btn-save').addEventListener('click', async () => {
  const titulo = document.getElementById('f-titulo').value.trim();
  const descripcion = document.getElementById('f-descripcion').value.trim();
  const genero = document.getElementById('f-genero').value.trim();
  const precio = document.getElementById('f-precio').value;
  const msg = document.getElementById('modal-msg');

  if (!titulo || !descripcion || !genero || !precio) {
    msg.textContent = 'Completa los campos requeridos'; return;
  }
  const datos = { titulo, descripcion, genero, precio };
  const duracion = document.getElementById('f-duracion').value.trim();
  const lanzamiento = document.getElementById('f-lanzamiento').value.trim();
  if (duracion) datos.duracion = duracion;
  if (lanzamiento) datos.lanzamiento = lanzamiento;
  const fileInput = document.getElementById('f-imgfile');
  if (fileInput.files[0]) {
    msg.textContent = 'Subiendo imagen...';
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    const res = await fetch(`${BACKEND}/product/upload-imagen`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` },
      body: formData
    });
    if (!res.ok) { msg.textContent = 'Error al subir imagen'; return; }
    const data = await res.json();
    datos.imgurl = data.url;
  }

  try {
    if (editingId) {
      await productAdapter.actualizar(editingId, datos, token);
    } else {
      await productAdapter.crear(datos, token);
    }
    msg.className = 'ok'; msg.textContent = '✓ Guardado';
    setTimeout(() => { document.getElementById('modal').classList.remove('open'); loadProducts(); }, 800);
  } catch {
    msg.className = ''; msg.textContent = 'Error al guardar.';
  }
});


async function loadOrders() {
  const tbody = document.getElementById('orders-tbody');
  try {
    const pedidos = await pedidoAdapter.todos(token);
    if (!pedidos.length) { tbody.innerHTML = '<tr><td colspan="5" class="loading">Sin pedidos</td></tr>'; return; }
    tbody.innerHTML = pedidos.map(p => {
      return `<tr>
        <td style="font-family:monospace;">${p.id?.slice(0,8)}...</td>
        <td style="font-family:monospace;">${p.id_product?.slice(0,8)}...</td>
        <td>${p.fecha_renta || '—'}</td>
        <td class="price">$${Number(p.total).toFixed(2)}</td>
        <td>
          <select class="estado-select" data-id="${p.id}">
            <option value="activo" ${p.estado==='activo'?'selected':''}>activo</option>
            <option value="devuelto" ${p.estado==='devuelto'?'selected':''}>devuelto</option>
            <option value="vencido" ${p.estado==='vencido'?'selected':''}>vencido</option>
          </select>
        </td>
      </tr>`;
    }).join('');

    tbody.querySelectorAll('.estado-select').forEach(sel => {
      sel.addEventListener('change', async () => {
        try {
          await pedidoAdapter.actualizarEstado(sel.dataset.id, sel.value, token);
        } catch { alert('Error al actualizar estado'); }
      });
    });
  } catch {
    tbody.innerHTML = '<tr><td colspan="5" class="loading">Error al cargar pedidos</td></tr>';
  }
}

loadProducts();
</script>
</body>
</html>

<!--
1. subir imagen directamente del dispositivo 
2. que el admin pueda chatear directamente con el cliente 
-->
