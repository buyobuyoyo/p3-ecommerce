<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="custom.css">
<link  rel="stylesheet" href="https://unpkg.com/98.css">
<link rel="icon" href="./assets/favicon/favicon.ico" type="image/x-icon">
</head>
<body>



<div class="titulotexto"><img class="buyosmovielair" src="./assets/title.gif" alt="title"></div>
    <div class="imgylogin">
           <div class="tituloimagen"><img src="./assets/nanikawiz.png" alt="Nanikawiz"></div>
           <div class="window" style="width: 450">
  <div class="title-bar">
    <div class="title-bar-text">Acceso</div>
    <div class="title-bar-controls">
      <button aria-label="Minimize"></button>
      <button aria-label="Maximize"></button>
      <button aria-label="Close"></button>
    </div>
  </div>
  <div class="window-body">
    <p><div class="panel-form">
  <div class="form-tag">Acceso al sistema</div>
  <h2 class="form-title">Iniciar Sesion</h2>
  <p class="form-subtitle">Usa tu cuenta de GitHub para entrar</p>

  <button class="btn btn-github" id="btn-github">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
    </svg>
    Entrar con GitHub
  </button>

  <div class="divider">o ingresa tu token manualmente</div>

  <div class="token-section">
    <label for="token-input">Access Token</label>
    <input type="text" id="token-input" placeholder="Pega tu token aquí..." />
  </div>

  <button class="btn btn-token" id="btn-token">Ingresar con Token</button>

  <div class="step-hint">
    <strong>¿Cómo obtener tu token?</strong><br>
    1. Haz clic en "Entrar con GitHub"<br>
    2. Autoriza la app en GitHub<br>
    3. Copia el <strong>access_token</strong> de la URL<br>
    4. Pégalo arriba y haz clic en "Ingresar con Token"
  </div>

  <div id="msg"></div>
</div>
    </div></p>
  </div>
</div>
      
   


<script type="module">
  import { authAdapter, BACKEND } from './infraestructure/app.js';
  
  const msg = document.getElementById('msg');

  async function verificarRetornoOAuth() {
    if (window.location.hash) {
      const fragmento = window.location.hash.substring(1);
      const params = new URLSearchParams(fragmento);
      const token = params.get('access_token');

      if (token) {
        try {
          msg.className = 'ok';
         
          
          await authAdapter.getMe(token);
          localStorage.setItem('token', token);
          
          try { await authAdapter.register(token); } catch {}
          
      
          
          window.location.hash = '';
          setTimeout(() => window.location.href = 'index.html', 800);
          return; 
        } catch (error) {
          msg.className = '';
          msg.textContent = 'El enlace de inicio de sesión expiró o es inválido.';
        }
      }
    }
  }
  
  verificarRetornoOAuth();

  document.getElementById('btn-github').addEventListener('click', async () => {
    try {
      const res = await fetch(`${BACKEND}/auth/login/github`);
      const data = await res.json();
      window.location.href = data.url;
    } catch (error) {
      msg.textContent = 'Error al conectar con el servidor backend.';
    }
  });

  document.getElementById('btn-token').addEventListener('click', async () => {
    const token = document.getElementById('token-input').value.trim();
    if (!token) { msg.textContent = 'Pega tu token primero'; return; }

    try {
      await authAdapter.getMe(token);
      localStorage.setItem('token', token);
      try { await authAdapter.register(token); } catch {}
      msg.className = 'ok';

      setTimeout(() => window.location.href = 'index.html', 800);
    } catch {
      msg.className = '';
      msg.textContent = 'Token inválido o expirado.';
    }
  });
</script>
</body>


</html>
